name: Publish Plugin

on:
    release:
        types: [ prereleased, released ]

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        name: 🚀 Publish to Registry
        steps:
            -   name: 🔒 Validate release version
                run: |
                    if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
                        echo "::error::Invalid release version '$RELEASE_VERSION'; expected a semver like 1.2.3 or 1.2.3-beta.1."
                        exit 1
                    fi

            -   name: 👀 Checkout
                uses: actions/checkout@v6

            -   name: ⚙️ Setup Bun
                uses: oven-sh/setup-bun@v2

            -   name: ✨ Setup node 25.x
                uses: actions/setup-node@v6
                with:
                    node-version: '25.x'
                    registry-url: https://registry.npmjs.org

            -   name: ✏️ Tag v${{ env.RELEASE_VERSION }}
                run: |
                    bun pm version "$RELEASE_VERSION" --no-git-tag-version

            -   name: 📦️ Install dependencies
                run: bun install --frozen-lockfile

            -   name: 🔨 Build
                run: bun run build

            -   name: 🚀 Publish v${{ env.RELEASE_VERSION }} (Pre-release)
                if: ${{ github.event.release.prerelease }}
                run: |
                    npm publish --access public --tag next

            -   name: 🚀 Publish v${{ env.RELEASE_VERSION }}
                if: ${{ !github.event.release.prerelease }}
                run: |
                    npm publish --access public
